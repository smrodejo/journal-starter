name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: journal_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

        options: >-
          --health-cmd "pg_isready -U user -d journal_test"
          --health-interval 10s
          --health-timeout 5s 
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Initialize Database
        env:
          PGPASSWORD: password
        run: |
          sleep 5
          psql -h localhost -U user -d journal_test -f database_setup.sql
          
      - name: Install dependencies
        run: uv sync --frozen --no-install-project

      - name: Run tests
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/journal_test
        run: uv run pytest
