name: Deploy

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Build and Push"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GAR_LOCATION: us-central1
      REPOSITORY: journal-repo
      IMAGE: journal-api
      GKE_CLUSTER: journal-cluster
      GKE_ZONE: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy to GKE
        run: |
          TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          sed -i "s|IMAGE_PLACEHOLDER|$TAG|g" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/journal-api
